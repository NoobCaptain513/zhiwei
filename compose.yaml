services:
  # ============================================================
  # 数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: zhiwei-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: zhiwei123
      MYSQL_DATABASE: zhiwei
      MYSQL_USER: zhiwei
      MYSQL_PASSWORD: zhiwei123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pzhiwei123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiwei-net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: zhiwei-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhiwei
      POSTGRES_PASSWORD: zhiwei123
      POSTGRES_DB: zhiwei_rag
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhiwei -d zhiwei_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiwei-net

  # ============================================================
  # 缓存 & 消息队列
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: zhiwei-redis
    restart: unless-stopped
    command: redis-server --requirepass zhiwei123 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "zhiwei123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiwei-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: zhiwei-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: zhiwei
      RABBITMQ_DEFAULT_PASS: zhiwei123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiwei-net

  # ============================================================
  # 本地大模型（可选）
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: zhiwei-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama
    networks:
      - zhiwei-net

  # ============================================================
  # 应用
  # ============================================================
  zhiwei:
    build: .
    container_name: zhiwei-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - zhiwei-net

# ============================================================
# 持久化卷
# ============================================================
volumes:
  mysql-data:
  pgvector-data:
  redis-data:
  ollama-data:

networks:
  zhiwei-net:
    driver: bridge
